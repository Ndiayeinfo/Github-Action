name: Build, test & docker publish

on:
  push:
    branches: [ main, release ]
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: [ main, release ]

permissions:
  contents: read

jobs:
  test-frontend:
    name: Test frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react-gtp
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-react-gtp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build
        run: npm run build

  test-backend:
    name: Test backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-fastapi-gtp
    env:
      # Base de données légère pour les tests CI (évite la dépendance à PostgreSQL)
      DATABASE_URL: sqlite:///./test.db
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend-fastapi-gtp/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Import check
        run: python -c "import app.main"

      - name: Run tests (pytest)
        shell: bash
        run: |
          set +e
          pytest -q
          code=$?
          if [ "$code" -eq 5 ]; then
            echo "Aucun test collecté (pytest exit code 5) — on continue."
            exit 0
          fi
          exit "$code"

  docker:
    name: Build & push Docker images
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USER }}/frontend-react-gtp
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (frontend)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-react-gtp
          file: ./frontend-react-gtp/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USER }}/backend-fastapi-gtp
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push (backend)
        uses: docker/build-push-action@v6
        with:
          context: ./backend-fastapi-gtp
          file: ./backend-fastapi-gtp/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
